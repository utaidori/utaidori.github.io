- date: 2026-04-25
  category: ws
  subcategory: rekisi
  title: "歴史発見講座"
  time: "17:30〜19:30"
  organization: "かるの造船所"
  organization_url: "https://karunozosenjo.com/"
  place: "カフェ トランジット"
  place_map: "https://maps.app.goo.gl/c2ZsRU5CTZggo62BA"
  place_note: "三島市大宮町1丁目4-7"
  image: "images/transit-6.jpg"
  is_quote: false
  description: |-
    世間士・かるのさんによる歴史講座。歴史や文化の移り変わり、今に残る史跡などを、わかりやすい解説で見ていきます。
    今回のテーマは「巨船の軌跡　核の時代の二律背反」です。
  fold_content: |-
    広島・長崎の原爆投下に次ぐ第五福竜丸事件。日本は核兵器による災厄を受けながらも、平和的に技術を用いることで敗戦を克服しようと考えた。
    科学技術が全ての人を幸せにすると考えられ、原子力が導入されていった経緯をお話します。
  fee: "700円 + ワンオーダー"

